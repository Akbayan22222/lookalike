<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real AI Look-Alike - Medet</title>
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: 'Arial Black', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #owner-name { position: absolute; top: 20px; left: 30px; color: #cda434; font-size: 1.2rem; letter-spacing: 2px; }
        #ai-status { position: absolute; top: 20px; right: 30px; color: #00fbff; font-size: 0.8rem; }
        
        #arena { display: flex; align-items: center; gap: 20px; width: 95vw; }
        .box-container { flex: 1; display: flex; flex-direction: column; align-items: center; }
        .box { width: 44vw; height: 44vw; border: 4px solid #222; border-radius: 20px; overflow: hidden; background: #111; position: relative; }
        video, img, canvas { width: 100%; height: 100%; object-fit: cover; }
        
        .vs { font-size: 2.5rem; color: #ffd700; text-shadow: 0 0 20px gold; margin-bottom: 30px; }
        .label { margin-top: 10px; color: #cda434; font-size: 1rem; text-transform: uppercase; }

        #scanner { position: absolute; width: 100%; height: 5px; background: #00fbff; top: 0; display: none; box-shadow: 0 0 20px #00fbff; z-index: 5; animation: scan 1.5s infinite linear; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        #match-box { transition: 0.6s; opacity: 0; transform: scale(0.6); border-color: #444; }
        #match-box.show { opacity: 1; transform: scale(1); border-color: gold; box-shadow: 0 0 40px gold; }

        .controls { margin-top: 30px; display: flex; gap: 10px; }
        button { padding: 15px 30px; font-size: 1rem; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        #btn-start { background: gold; color: #000; box-shadow: 0 0 15px gold; }
        #btn-switch { background: #333; color: #fff; }
        button:disabled { background: #222; color: #555; box-shadow: none; }
    </style>
</head>
<body>

    <div id="owner-name">MEDET MUHAMEDZHANOV</div>
    <div id="ai-status">ИИ ЗАГРУЖАЕТСЯ...</div>

    <div id="arena">
        <div class="box-container">
            <div class="box">
                <div id="scanner"></div>
                <video id="video" autoplay muted playsinline></video>
                <canvas id="snapshot" style="display:none"></canvas>
            </div>
            <div class="label">ГОСТЬ</div>
        </div>
        <div class="vs">VS</div>
        <div class="box-container">
            <div class="box" id="match-box">
                <img id="match-img" src="" crossorigin="anonymous">
            </div>
            <div class="label" id="match-name">ДВОЙНИК</div>
        </div>
    </div>

    <div class="controls">
        <button id="btn-switch" onclick="toggleCamera()">🔄 КАМЕРА</button>
        <button id="btn-start" disabled onclick="processLookAlike()">КТО ТВОЙ ДВОЙНИК?</button>
    </div>

    <script>
        const video = document.getElementById('video');
        const matchBox = document.getElementById('match-box');
        const matchImg = document.getElementById('match-img');
        const matchName = document.getElementById('match-name');
        const scanner = document.getElementById('scanner');
        const btnStart = document.getElementById('btn-start');
        const aiStatus = document.getElementById('ai-status');

        let faceMatcher = null;
        let currentFacingMode = "user";

        // База звезд с проверенными CORS-ссылками
        const celebs = [
            { name: "Лео Ди Каприо", url: "https://upload.wikimedia.org/wikipedia/commons/thumb/4/46/Leonardo_Dicaprio_Cannes_2019.jpg/400px-Leonardo_Dicaprio_Cannes_2019.jpg" },
            { name: "Анджелина Джоли", url: "https://upload.wikimedia.org/wikipedia/commons/thumb/a/ad/Angelina_Jolie_2_WCD_2014.jpg/400px-Angelina_Jolie_2_WCD_2014.jpg" },
            { name: "Брэд Питт", url: "https://upload.wikimedia.org/wikipedia/commons/thumb/5/51/Brad_Pitt_Cannes_2019.jpg/400px-Brad_Pitt_Cannes_2019.jpg" },
            { name: "Уилл Смит", url: "https://upload.wikimedia.org/wikipedia/commons/thumb/3/3f/TechCrunch_Disrupt_2019_-_Day_2_%2848834434641%29_%28cropped%29.jpg/400px-TechCrunch_Disrupt_2019_-_Day_2_%2848834434641%29_%28cropped%29.jpg" },
            { name: "Джеки Чан", url: "https://upload.wikimedia.org/wikipedia/commons/thumb/8/8b/Jackie_Chan_July_2016.jpg/400px-Jackie_Chan_July_2016.jpg" },
            { name: "Скарлетт Йоханссон", url: "https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Scarlett_Johansson_by_Gage_Skidmore_2.jpg/400px-Scarlett_Johansson_by_Gage_Skidmore_2.jpg" }
        ];

        async function init() {
            const URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
            await Promise.all([
                faceapi.nets.ssdMobilenetv1.loadFromUri(URL),
                faceapi.nets.faceLandmark68Net.loadFromUri(URL),
                faceapi.nets.faceRecognitionNet.loadFromUri(URL)
            ]);

            aiStatus.innerText = "ИИ АНАЛИЗИРУЕТ ЗВЕЗД...";
            
            const labeledDescriptors = await Promise.all(
                celebs.map(async celeb => {
                    const img = await faceapi.fetchImage(celeb.url);
                    const desc = await faceapi.detectSingleFace(img).withFaceLandmarks().withFaceDescriptor();
                    return new faceapi.LabeledFaceDescriptors(celeb.name, [desc.descriptor]);
                })
            );

            faceMatcher = new faceapi.FaceMatcher(labeledDescriptors, 0.6);
            aiStatus.innerText = "ИИ ГОТОВ";
            aiStatus.style.color = "#00ff00";
            startStream();
        }

        async function startStream() {
            if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacingMode } });
            video.srcObject = stream;
            btnStart.disabled = false;
        }

        function toggleCamera() {
            currentFacingMode = (currentFacingMode === "user") ? "environment" : "user";
            startStream();
        }

        async function processLookAlike() {
            btnStart.disabled = true;
            matchBox.classList.remove('show');
            scanner.style.display = "block";
            aiStatus.innerText = "СРАВНЕНИЕ...";

            const detection = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();

            if (!detection) {
                alert("Лицо не найдено! Попробуйте еще раз.");
                scanner.style.display = "none";
                btnStart.disabled = false;
                return;
            }

            const bestMatch = faceMatcher.findBestMatch(detection.descriptor);
            const res = celebs.find(c => c.name === bestMatch.label);

            setTimeout(() => {
                scanner.style.display = "none";
                matchImg.src = res.url;
                matchName.innerText = res.name;
                matchBox.classList.add('show');
                aiStatus.innerText = "ГОТОВО";
                setTimeout(() => { btnStart.disabled = false; }, 3000);
            }, 2000);
        }

        window.onload = init;
    </script>
</body>
</html>
